<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>QNA & Peter · Italy Trip</title>

  <style>
    :root{
      --it-green:#1f7a4c;
      --it-red:#c93a2f;
      --page:#f3f6ff;
      --page-2:#eef2f8;
      --card:#ffffff;
      --card-2:#fbfdff;
      --text:#0f172a;
      --muted:#64748b;
      --border:rgba(15,23,42,.10);
      --border-strong:rgba(15,23,42,.16);
      --shadow:0 16px 40px rgba(15,23,42,.10);
      --shadow-soft:0 10px 24px rgba(15,23,42,.08);
      --radius:20px;

      --brand:linear-gradient(135deg, #1f7a4c, #2aa56f);
      --brand-soft:linear-gradient(135deg, rgba(31,122,76,.14), rgba(42,165,111,.08));

      --tint-flight: linear-gradient(135deg, rgba(31,122,76,.14), rgba(255,255,255,0));
      --tint-lodging: linear-gradient(135deg, rgba(59,130,246,.14), rgba(255,255,255,0));
      --tint-transport: linear-gradient(135deg, rgba(249,115,22,.14), rgba(255,255,255,0));
      --tint-notes: linear-gradient(135deg, rgba(99,102,241,.12), rgba(255,255,255,0));
      --tint-featured: linear-gradient(135deg, rgba(245,158,11,.18), rgba(255,255,255,0));
    }

    *{ box-sizing:border-box }
    body{
      margin:0;
      font-family: system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans TC",
                   "Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",sans-serif;
      background: radial-gradient(900px 600px at 10% -10%, #ffffff 0%, var(--page) 55%, var(--page-2) 100%);
      color:var(--text);
    }

    header{
      position:sticky; top:0; z-index:20;
      background: rgba(255,255,255,.78);
      backdrop-filter: blur(10px);
      border-bottom:1px solid var(--border);
    }
    .topbar{
      max-width:1040px; margin:0 auto;
      padding:12px 16px;
      display:flex; align-items:center; justify-content:space-between; gap:12px;
    }
    .brand{
      display:flex; flex-direction:column; gap:2px;
      font-weight:900; letter-spacing:.2px;
      line-height:1.1;
    }
    .brand .sub{ font-size:12px; color:var(--muted); font-weight:700; letter-spacing:.1px; }

    .pill{
      display:inline-flex; align-items:center; gap:8px;
      padding:8px 12px;
      border-radius:999px;
      background: rgba(31,122,76,.10);
      color: var(--it-green);
      border:1px solid rgba(31,122,76,.18);
      font-size:12px;
      font-weight:900;
      white-space:nowrap;
    }
    .pill.danger{
      background: rgba(201,58,47,.10);
      border-color: rgba(201,58,47,.20);
      color: var(--it-red);
    }

    .container{ max-width:1040px; margin:16px auto 96px; padding:0 16px; }
    .grid{ display:grid; gap:14px; }
    @media(min-width:920px){ .grid-2{ grid-template-columns:1.25fr .75fr; } }

    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius);
      padding:16px;
      box-shadow: var(--shadow);
    }

    .title{ margin:0; font-size:26px; font-weight:900; letter-spacing:-.2px; }
    .muted{ color:var(--muted); font-size:14px; line-height:1.5; }
    .hr{ height:1px; background:var(--border); margin:12px 0; }

    .row{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    .right{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    .tiny{ font-size:12px; color:var(--muted); }

    .btn{
      display:inline-flex; align-items:center; justify-content:center; gap:8px;
      height:42px; padding:0 14px;
      border-radius:14px;
      border:1px solid transparent;
      cursor:pointer;
      font-size:14px;
      font-weight:900;
      color:#fff;
      background: var(--brand);
      box-shadow: 0 10px 20px rgba(31,122,76,.18);
      transition: transform .08s ease;
      user-select:none;
      line-height:1;
      -webkit-appearance:none;
      appearance:none;
    }
    .btn:active{ transform: translateY(1px); }
    .btn.secondary{
      color:var(--text);
      background:#fff;
      border:1px solid var(--border);
      box-shadow:none;
    }

    input, select, textarea{
      border:1px solid var(--border);
      border-radius:14px;
      padding:10px 12px;
      font-size:14px;
      background:#fff;
      outline:none;
      width:100%;
    }
    textarea{ min-height:110px; resize:vertical; }
    input:focus, select:focus, textarea:focus{
      border-color: rgba(31,122,76,.45);
      box-shadow:0 0 0 4px rgba(31,122,76,.10);
    }

    .list{ display:flex; flex-direction:column; gap:10px; }
    .item{
      display:flex; align-items:flex-start; justify-content:space-between; gap:12px;
      padding:12px;
      border:1px solid var(--border);
      border-radius:18px;
      background: linear-gradient(180deg, #fff, var(--card-2));
      box-shadow: var(--shadow-soft);
    }
    .item h3{ margin:0; font-size:15px; font-weight:900; }
    .item p{ margin:5px 0 0; font-size:13px; color:var(--muted); line-height:1.45; }

    .badge{
      display:inline-flex; align-items:center; gap:6px;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid var(--border);
      background:#fff;
      font-weight:900;
      font-size:12px;
      color:var(--text);
      white-space:nowrap;
    }
    .badge.gold{
      background: rgba(245,158,11,.10);
      border-color: rgba(245,158,11,.20);
      color:#92400e;
    }

    .subcard{
      border:1px solid var(--border-strong);
      border-radius:18px;
      padding:12px;
      box-shadow: var(--shadow-soft);
      background: #fff;
      overflow:hidden;
      position:relative;
    }
    .subcard:before{
      content:"";
      position:absolute; inset:0;
      background: var(--brand-soft);
      opacity:.85;
      pointer-events:none;
    }
    .subcard > *{ position:relative; }
    .subcardHead{
      display:flex; justify-content:space-between; align-items:flex-start; gap:10px;
      margin-bottom:8px;
    }
    .subcardTitle{ font-weight:900; }
    .subcard.tint-flight:before{ background: var(--tint-flight); }
    .subcard.tint-lodging:before{ background: var(--tint-lodging); }
    .subcard.tint-transport:before{ background: var(--tint-transport); }
    .subcard.tint-notes:before{ background: var(--tint-notes); }
    .subcard.tint-featured:before{ background: var(--tint-featured); }

    .subcard textarea{
      min-height:86px;
      background: rgba(255,255,255,.82);
    }

    /* Modules (Photos/Checklist) */
    .modules{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:14px;
      margin-top:14px;
    }
    .module{
      background: linear-gradient(180deg, rgba(255,255,255,.92), var(--card-2));
      border: 1px solid var(--border-strong);
      box-shadow: var(--shadow-soft);
      border-radius: 18px;
      padding: 14px;
      min-height: 170px;
    }
    .module__head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding-bottom:10px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 10px;
    }
    .module__title{ font-weight: 900; }
    .module__actions{
      display:flex;
      gap:8px;
      align-items:center;
      flex-shrink:0;
    }
    .btnMini, .btnMiniPrimary{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      height:34px;
      padding:0 10px;
      border-radius:12px;
      font-weight:900;
      font-size:13px;
      line-height:1;
      white-space:nowrap;
      -webkit-appearance:none;
      appearance:none;
      font-family: inherit;
      cursor:pointer;
      user-select:none;
    }
    label.btnMini{ cursor:pointer; }
    .btnMini{
      border:1px solid var(--border);
      background: rgba(255,255,255,.78);
      color: var(--text);
    }
    .btnMiniPrimary{
      border:1px solid transparent;
      background: var(--brand);
      color:#fff;
      box-shadow: 0 10px 20px rgba(31,122,76,.14);
    }
    .btnMiniPrimary.alt{
      background: linear-gradient(135deg, rgba(245,158,11,.95), rgba(245,158,11,.75));
      box-shadow: 0 10px 20px rgba(245,158,11,.18);
    }

    /* Photos */
    .photoGrid{
      display:grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap:10px;
    }
    .photoCard{
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow:hidden;
      position:relative;
    }
    .photoCard img{
      width:100%;
      height:120px;
      object-fit:cover;
      display:block;
    }
    .photoCard .x{
      position:absolute; top:8px; right:8px;
      width:32px; height:32px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.92);
      cursor:pointer;
    }
    .photoCard .meta{
      padding:8px 10px;
      font-size:12px;
      color: var(--muted);
    }
    .emptyHint{
      margin-top:10px;
      padding:10px 12px;
      border-radius:14px;
      border:1px dashed var(--border-strong);
      color: var(--muted);
      background: rgba(255,255,255,.65);
    }

    /* Checklist */
    .checkForm{ display:flex; gap:10px; align-items:center; }
    .checkForm input{
      flex:1;
      height:40px;
      border-radius: 14px;
      border: 1px solid var(--border-strong);
      padding: 0 12px;
      background: #fff;
    }
    .checkList{
      margin-top:10px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .checkItem{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:10px 12px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: #fff;
    }
    .checkItem label{
      display:flex;
      align-items:center;
      gap:10px;
      cursor:pointer;
      font-weight:800;
    }
    .checkItem .del{
      width:34px; height:34px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background:#fff;
      cursor:pointer;
    }

    /* Bottom tabs */
    .tabbar{
      position:fixed; left:0; right:0; bottom:0; z-index:30;
      background: rgba(255,255,255,.92);
      backdrop-filter: blur(10px);
      border-top:1px solid var(--border);
      padding:10px 10px 12px;
    }
    .tabs{
      max-width:1040px; margin:0 auto;
      display:grid; grid-template-columns:repeat(4,1fr); gap:8px;
    }
    .tab{
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px;
      padding:10px 8px;
      border-radius:16px;
      border:1px solid transparent;
      color:var(--muted);
      text-decoration:none;
      font-weight:900;
      font-size:12px;
      -webkit-tap-highlight-color: transparent;
    }
    .tab .ico{ font-size:18px; }
    .tab.active{
      color:var(--it-green);
      background: rgba(31,122,76,.10);
      border-color: rgba(31,122,76,.18);
    }

    @media (max-width: 860px){
      .title{ font-size:24px; }
      .modules{ grid-template-columns: 1fr; }
      .module__actions{ gap:6px; }
      .btnMini, .btnMiniPrimary{ height:32px; padding:0 9px; font-size:12px; border-radius:11px; }
      .checkForm{ flex-wrap:wrap; }
      .checkForm input{ flex:1 1 100%; }
      .checkForm button{ width:100%; height:36px; border-radius:12px; }
    }

    /* Explore */
    .chipbar{ display:flex; gap:8px; flex-wrap:wrap; }
    .chip{
      padding:7px 10px;
      border-radius:999px;
      border:1px solid var(--border);
      background:#fff;
      font-size:13px;
      font-weight:900;
      cursor:pointer;
      user-select:none;
    }
    .chip.active{ background: rgba(31,122,76,.10); border-color: rgba(31,122,76,.22); color: var(--it-green); }

    /* Itinerary - day cards */
    .dayCard{
      border:1px solid var(--border);
      border-radius:18px;
      padding:14px;
      background: #fff;
      box-shadow: 0 10px 25px rgba(15,23,42,.06);
      margin:12px 0;
    }
    .dayHead{
      display:flex; justify-content:space-between; gap:12px; align-items:center; flex-wrap:wrap;
      cursor:pointer;
      user-select:none;
    }
    .dayTitle{ margin:0; font-size:16px; font-weight:900; }
    .dayMeta{ color:var(--muted); font-size:13px; margin-top:4px; }

    .progressWrap{ display:flex; align-items:center; gap:10px; }
    .bar{
      width:140px; height:10px; border-radius:999px;
      background: rgba(15,23,42,.08);
      overflow:hidden;
    }
    .bar > div{ height:100%; width:0%; background: var(--brand); border-radius:999px; }
    .chev{
      width:34px; height:34px;
      border-radius:12px;
      border:1px solid var(--border);
      background:#fff;
      display:inline-flex; align-items:center; justify-content:center;
      font-weight:900;
    }
    .dayBody{ margin-top:10px; display:none; }
    .dayCard.open .dayBody{ display:block; }

    /* period sections */
    .periodBlock{
      border:1px solid var(--border);
      border-radius:16px;
      padding:12px;
      background: linear-gradient(180deg, rgba(255,255,255,.94), var(--card-2));
      box-shadow: var(--shadow-soft);
      margin:10px 0;
    }
    .periodHead{
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      margin-bottom:10px;
    }
    .periodTitle{ font-weight:900; }
    .periodActions{ display:flex; gap:8px; align-items:center; flex-wrap:wrap; }

    .noteHeader{ display:flex; justify-content:space-between; align-items:flex-end; gap:12px; flex-wrap:wrap; }
    .noteTitle{ font-size:16px; font-weight:900; margin:0; }
    .noteHint{ font-size:12px; color:var(--muted); }

    @media(min-width:920px){
      .bar{ width:180px; }
    }

    /* iOS Reminders-like swipe item */
    .swipeItem{
      position:relative;
      border:1px solid var(--border);
      background:#fff;
      border-radius:14px;
      overflow:hidden;
      box-shadow: 0 10px 24px rgba(15,23,42,.05);
      margin:10px 0;
    }
    .swipeBg{
      position:absolute; inset:0;
      display:flex; align-items:center; justify-content:space-between;
      pointer-events:none;
      padding:0 14px;
      font-weight:900;
    }
    .swipeBg .doneBg{
      color:#fff;
      opacity:0;
      transform: translateX(-8px);
      transition: .12s ease;
    }
    .swipeBg .moreBg{
      display:flex; gap:8px;
      opacity:0;
      transform: translateX(8px);
      transition: .12s ease;
      pointer-events:none;
    }
    .swipeBg .moreBtn{
      pointer-events:auto;
      border:1px solid rgba(255,255,255,.3);
      background: rgba(255,255,255,.18);
      color:#fff;
      height:34px;
      padding:0 10px;
      border-radius:12px;
      font-weight:900;
      font-size:13px;
      cursor:pointer;
    }
    .swipeItem[data-reveal="done"]{ background: linear-gradient(90deg, rgba(31,122,76,.95), rgba(31,122,76,.78)); }
    .swipeItem[data-reveal="more"]{ background: linear-gradient(270deg, rgba(201,58,47,.92), rgba(201,58,47,.75)); }
    .swipeItem[data-reveal="done"] .doneBg{ opacity:1; transform:none; }
    .swipeItem[data-reveal="more"] .moreBg{ opacity:1; transform:none; }

    .swipeFg{
      position:relative;
      background:#fff;
      padding:12px 12px;
      transform: translateX(0);
      transition: transform .18s ease;
      touch-action: pan-y;
    }
    .swipeItem.isDragging .swipeFg{ transition:none; }
    .swipeRow{
      display:grid;
      grid-template-columns: 26px 1fr;
      gap:10px;
      align-items:flex-start;
    }
    .iosCheck{
      width:22px; height:22px;
      border-radius:999px;
      border:2px solid rgba(15,23,42,.22);
      margin-top:2px;
      display:flex; align-items:center; justify-content:center;
      flex:0 0 auto;
      cursor:pointer;
      user-select:none;
    }
    .iosCheck .tick{
      font-size:14px;
      line-height:1;
      transform: scale(.85);
      opacity:0;
    }
    .swipeItem[data-done="1"] .iosCheck{
      border-color: rgba(31,122,76,.9);
      background: rgba(31,122,76,.92);
    }
    .swipeItem[data-done="1"] .iosCheck .tick{
      opacity:1;
      color:#fff;
    }
    .swipeMain{
      font-size:14px;
      line-height:1.4;
    }
    .swipeMain .en{
      font-size:12px;
      color:var(--muted);
      margin-top:4px;
    }
    .swipeItem[data-done="1"] .swipeMain{
      opacity:.55;
      text-decoration: line-through;
    }

    /* Bottom Sheet */
    .sheetOverlay{
      position:fixed; inset:0; z-index:80;
      background: rgba(15,23,42,.40);
      opacity:0; pointer-events:none;
      transition: opacity .18s ease;
    }
    .sheetOverlay.open{ opacity:1; pointer-events:auto; }

    .sheet{
      position:fixed; left:0; right:0; bottom:-100%;
      z-index:90;
      background: rgba(255,255,255,.92);
      backdrop-filter: blur(14px);
      border-top-left-radius: 22px;
      border-top-right-radius: 22px;
      box-shadow: 0 -18px 50px rgba(15,23,42,.18);
      transition: bottom .22s ease;
      padding: 10px 12px 16px;
    }
    .sheet.open{ bottom:0; }
    .sheetHandle{
      width:44px; height:5px;
      border-radius:999px;
      background: rgba(15,23,42,.14);
      margin: 8px auto 10px;
    }
    .sheetHead{
      display:flex; align-items:flex-start; justify-content:space-between; gap:10px;
      padding: 0 4px 8px;
    }
    .sheetTitle{ font-weight:900; font-size:15px; }
    .sheetSub{ color: var(--muted); font-size:12px; margin-top:3px; }
    .sheetClose{
      width:34px; height:34px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background:#fff;
      cursor:pointer;
      font-weight:900;
    }
    .sheetBody{
      padding: 0 4px;
      display:flex;
      flex-direction:column;
      gap:10px;
      max-height: 70vh;
      overflow:auto;
    }
    .sheetSearch{
      height:40px;
      border-radius: 14px;
      border:1px solid var(--border);
      padding:0 12px;
      font-weight:800;
      background:#fff;
    }
    .sheetList{
      display:flex;
      flex-direction:column;
      gap:10px;
      padding-bottom: 8px;
    }
    .sheetItem{
      display:flex; align-items:flex-start; justify-content:space-between; gap:10px;
      padding: 12px;
      border-radius: 16px;
      border:1px solid var(--border);
      background: #fff;
      box-shadow: var(--shadow-soft);
      cursor:pointer;
      user-select:none;
    }
    .sheetItem:active{ transform: translateY(1px); }
    .sheetItem .name{ font-weight:900; }
    .sheetItem .meta{ font-size:12px; color: var(--muted); margin-top:4px; }
  </style>
</head>

<body>
<header>
  <div class="topbar">
    <div class="brand">
      <div>QNA & Peter 🍕 <span style="color:var(--it-green)">Italy</span></div>
      <div class="sub">Rome · Florence · Venice</div>
    </div>
    <div class="pill">✈️ Flight Mode</div>
  </div>
</header>

<div class="container" id="app"></div>

<!-- Bottom Sheet -->
<div class="sheetOverlay" id="sheetOverlay"></div>
<div class="sheet" id="sheet">
  <div class="sheetHandle"></div>
  <div class="sheetHead">
    <div>
      <div class="sheetTitle" id="sheetTitle">＋ 從精選加入</div>
      <div class="sheetSub" id="sheetSub">點一下就加入到對應時段</div>
    </div>
    <button class="sheetClose" id="sheetClose" type="button">✕</button>
  </div>
  <div class="sheetBody">
    <input class="sheetSearch" id="sheetSearch" placeholder="搜尋精選：名稱 / 標籤 / 城市…" />
    <div class="sheetList" id="sheetList"></div>
    <div class="emptyHint" id="sheetEmpty" style="display:none;">你還沒有精選～去 Explore 加 ✨ 精選後再回來加進行程。</div>
  </div>
</div>

<div class="tabbar">
  <div class="tabs" id="tabs">
    <a class="tab" href="#home" data-route="home"><div class="ico">🏠</div>Home</a>
    <a class="tab" href="#itinerary" data-route="itinerary"><div class="ico">📚</div>行程</a>
    <a class="tab" href="#explore" data-route="explore"><div class="ico">✨</div>探索</a>
    <a class="tab" href="#notes" data-route="notes"><div class="ico">📝</div>筆記</a>
  </div>
</div>

<script>
/* ===========================
  Helpers
=========================== */
const app = document.getElementById("app");

function uuid(){
  return (crypto?.randomUUID?.())
    || ("id-" + Date.now().toString(36) + "-" + Math.random().toString(36).slice(2));
}
function groupBy(arr, keyFn){
  return arr.reduce((acc, x)=>{
    const k = keyFn(x);
    (acc[k] ||= []).push(x);
    return acc;
  }, {});
}
function labelType(t){
  const map = { spot:"景點", food:"餐廳", cafe:"咖啡", dessert:"甜點" };
  return map[t] || t;
}
function typeEmoji(t){
  const map = { spot:"📍", food:"🍽️", cafe:"☕", dessert:"🍰" };
  return map[t] || "•";
}
function escapeHTML(s){
  return String(s ?? "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#39;");
}
function calcDays(startISO, endISO){
  const s = new Date(startISO + "T00:00:00");
  const e = new Date(endISO + "T00:00:00");
  const ms = e - s;
  return Math.max(1, Math.round(ms / 86400000));
}

function flattenPlaces(db){
  const out = [];
  for(const [country, cities] of Object.entries(db)){
    for(const [area, types] of Object.entries(cities)){
      for(const [type, items] of Object.entries(types)){
        for(const item of items){
          out.push({ ...item, country, area, type });
        }
      }
    }
  }
  return out;
}

/* utilities */
function loadJSON(key, fallback){
  try{
    const raw = localStorage.getItem(key);
    if(raw === null) return fallback;
    const val = JSON.parse(raw);
    return (val ?? fallback);
  }catch{
    return fallback;
  }
}
function saveJSON(key, val){ localStorage.setItem(key, JSON.stringify(val)); }

/* state */
let featured = new Set(loadJSON(KEY_FEATURED, []));
let plan = loadJSON(KEY_PLAN, null);
let doneItems = loadJSON(KEY_DONE, {});
let openDays = new Set(loadJSON(KEY_DAY_OPEN, []));

let dayNotes = loadJSON(KEY_NOTE_DAY, {});
let globalNote = loadJSON(KEY_NOTE_GLOBAL, "");
let lodgingNote = loadJSON(KEY_LODGING, "");
let transportNote = loadJSON(KEY_TRANSPORT, "");

/* ===========================
  Plan init
=========================== */
const PERIOD_ORDER = ["上午","中午","下午","傍晚","晚上"];

function ensurePlan(){
  if(plan && typeof plan === "object") return;

  const obj = {};
  for(const d of itinerary){
    const slots = {};
    for(const p of PERIOD_ORDER) slots[p] = [];
    d.items.forEach((it, idx)=>{
      const pid = `d${d.day}-i${idx}`;
      const item = { id: pid, kind:"text", zh: it.zh, en: it.en, city: d.city, period: it.period };
      slots[it.period].push(item);
    });
    obj[String(d.day)] = { day: d.day, date: d.date, city: d.city, move: d.move || "", slots };
  }
  plan = obj;
  saveJSON(KEY_PLAN, plan);
}
ensurePlan();

/* ===========================
  Plan ops
=========================== */
function getDayPlan(day){ return plan?.[String(day)]; }

function setDayOpen(day, open){
  const s = new Set(openDays);
  if(open) s.add(day); else s.delete(day);
  openDays = s;
  saveJSON(KEY_DAY_OPEN, [...openDays]);
  render();
}
function toggleDoneByItemId(itemId){
  doneItems[itemId] = !doneItems[itemId];
  saveJSON(KEY_DONE, doneItems);
  render();
}
function addFeaturedToSlot(day, period, placeId){
  const d = getDayPlan(day);
  if(!d) return;
  const p = placeById.get(placeId);
  if(!p) return;

  const item = {
    id: uuid(),
    kind: "place",
    placeId: p.id,
    zh: p.name,
    en: "",
    city: d.city,
    period
  };
  d.slots[period] ||= [];
  d.slots[period].push(item);
  saveJSON(KEY_PLAN, plan);
  render();
}
function removeSlotItem(day, period, itemId){
  const d = getDayPlan(day);
  if(!d) return;
  d.slots[period] = (d.slots[period] || []).filter(x=>x.id !== itemId);
  if(doneItems[itemId]){ delete doneItems[itemId]; saveJSON(KEY_DONE, doneItems); }
  saveJSON(KEY_PLAN, plan);
  render();
}
function moveSlotItem(day, period, itemId, dir){
  const d = getDayPlan(day);
  if(!d) return;
  const arr = d.slots[period] || [];
  const idx = arr.findIndex(x=>x.id === itemId);
  if(idx < 0) return;
  const j = idx + dir;
  if(j < 0 || j >= arr.length) return;
  [arr[idx], arr[j]] = [arr[j], arr[idx]];
  d.slots[period] = arr;
  saveJSON(KEY_PLAN, plan);
  render();
}

/* ===========================
  Photos (IndexedDB)
=========================== */
function idbOpen(){
  return new Promise((resolve, reject)=>{
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = ()=>{
      const db = req.result;
      if(!db.objectStoreNames.contains(STORE)){
        db.createObjectStore(STORE, { keyPath: "id" });
      }
    };
    req.onsuccess = ()=> resolve(req.result);
    req.onerror = ()=> reject(req.error);
  });
}
async function idbPut(record){
  const db = await idbOpen();
  return new Promise((resolve, reject)=>{
    const tx = db.transaction(STORE, "readwrite");
    tx.objectStore(STORE).put(record);
    tx.oncomplete = ()=> resolve(true);
    tx.onerror = ()=> reject(tx.error);
  });
}
async function idbGetAll(){
  const db = await idbOpen();
  return new Promise((resolve, reject)=>{
    const tx = db.transaction(STORE, "readonly");
    const req = tx.objectStore(STORE).getAll();
    req.onsuccess = ()=> resolve(req.result || []);
    req.onerror = ()=> reject(req.error);
  });
}
async function idbDelete(id){
  const db = await idbOpen();
  return new Promise((resolve, reject)=>{
    const tx = db.transaction(STORE, "readwrite");
    tx.objectStore(STORE).delete(id);
    tx.oncomplete = ()=> resolve(true);
    tx.onerror = ()=> reject(tx.error);
  });
}
async function idbClear(){
  const db = await idbOpen();
  return new Promise((resolve, reject)=>{
    const tx = db.transaction(STORE, "readwrite");
    tx.objectStore(STORE).clear();
    tx.oncomplete = ()=> resolve(true);
    tx.onerror = ()=> reject(tx.error);
  });
}
async function renderPhotos(){
  const grid = document.getElementById("photoGrid");
  const empty = document.getElementById("photoEmptyHint");
  if(!grid) return;

  const items = (await idbGetAll()).sort((a,b)=> (b.createdAt||0) - (a.createdAt||0));
  grid.innerHTML = "";

  for(const it of items){
    const url = URL.createObjectURL(it.blob);
    const el = document.createElement("div");
    el.className = "photoCard";
    el.innerHTML = `
      <button class="x" title="刪除" data-photo-del="${it.id}">✕</button>
      <img alt="photo" src="${url}">
      <div class="meta">${new Date(it.createdAt).toLocaleString()}</div>
    `;
    el.querySelector("img").addEventListener("load", ()=> URL.revokeObjectURL(url));
    grid.appendChild(el);
  }
  if(empty) empty.style.display = items.length ? "none" : "block";
}

function openSheet(target){
  pickerTarget = target;
  sheetTitle.textContent = `＋ 從精選加入（Day ${target.day} · ${target.period}）`;
  sheetSub.textContent = `${target.city}｜點一下就加入（可加多個）`;

function featuredOptionsForCity(city){
  const arr = [...featured].map(id=>placeById.get(id)).filter(Boolean);
  const filtered = arr.filter(p=>p.area === city);
  return filtered.length ? filtered : arr;
}
function renderSheetList(){
  const q = (sheetSearch.value || "").trim().toLowerCase();
  const t = pickerTarget;
  const options = t ? featuredOptionsForCity(t.city) : [];

  if(!options.length){
    sheetList.innerHTML = "";
    sheetEmpty.style.display = "block";
    return;
  }
  sheetEmpty.style.display = "none";

  const filtered = options.filter(p=>{
    if(!q) return true;
    const hay = (p.name + " " + (p.tags||[]).join(" ") + " " + p.area + " " + p.type).toLowerCase();
    return hay.includes(q);
  });

  if(!filtered.length){
    sheetList.innerHTML = `<div class="muted">沒有符合的精選（換個關鍵字試試）</div>`;
    return;
  }

  sheetList.innerHTML = filtered.map(p=>{
    const tags = (p.tags||[]).slice(0,4).map(t=>"#"+t).join(" ");
    return `
      <div class="sheetItem" data-sheet-pick="${escapeHTML(p.id)}">
        <div>
          <div class="name">${typeEmoji(p.type)} ${escapeHTML(p.name)}</div>
          <div class="meta">${escapeHTML(p.area)} · ${labelType(p.type)}${tags ? " · " + escapeHTML(tags) : ""}</div>
        </div>
        <div class="badge gold">加入</div>
      </div>
    `;
  }).join("");
}
sheetSearch.addEventListener("input", renderSheetList);

          }
        </div>
      </div>
    </div>
  `;

  document.getElementById("lodgingNote")?.addEventListener("input", saveLodging);
  document.getElementById("transportNote")?.addEventListener("input", saveTransport);
}

function calcDayProgress(dayPlan){
  let total = 0, done = 0;
  for(const p of PERIOD_ORDER){
    const arr = dayPlan.slots[p] || [];
    for(const it of arr){
      total += 1;
      if(doneItems[it.id]) done += 1;
    }
  }
  const pct = total ? Math.round((done/total)*100) : 0;
  return {total, done, pct};
}

function renderDay(d){
  const isOpen = openDays.has(d.day);
  const {total, done, pct} = calcDayProgress(d);
  const noteVal = (dayNotes[String(d.day)] || "");

  return `
    <div class="dayCard ${isOpen ? "open" : ""}" id="day-${d.day}">
      <div class="dayHead" data-day-toggle="${d.day}">
        <div>
          <div class="dayTitle">Day ${d.day} (${escapeHTML(d.date)}) · ${escapeHTML(d.city)}</div>
          <div class="dayMeta">${d.move ? "🚄 " + escapeHTML(d.move) : ""}</div>
        </div>
        <div class="progressWrap">
          <div class="muted" style="font-weight:900;">${done}/${total}</div>
          <div class="bar"><div style="width:${pct}%"></div></div>
          <div class="pill">${pct}%</div>
          <div class="chev">${isOpen ? "▾" : "▸"}</div>
        </div>
      </div>

      <div class="dayBody">
        ${PERIOD_ORDER.map(p=>renderPeriod(d.day, p, d.city)).join("")}

        <div style="height:10px"></div>

        <div class="card" style="box-shadow:none;border:1px solid var(--border);">
          <div class="noteHeader">
            <div>
              <div class="noteTitle">📝 Day ${d.day} Notes</div>

          <textarea id="dayNote-${d.day}" placeholder="寫下今天的筆記…">${escapeHTML(noteVal)}</textarea>

  `;
}

function renderPeriod(day, period, city){
  const d = getDayPlan(day);
  const arr = d?.slots?.[period] || [];

  return `
    <div class="periodBlock">
      <div class="periodHead">
        <div class="periodTitle">${escapeHTML(period)}</div>
        <div class="periodActions">
          <button class="btnMiniPrimary alt" type="button" data-open-picker="${day}|${escapeHTML(period)}|${escapeHTML(city)}">＋ 加入精選</button>
          <span class="badge">共 ${arr.length}</span>
        </div>
      </div>

      ${
        arr.length
          ? arr.map((it, idx)=>renderSwipeRow(day, period, it, idx, arr.length)).join("")
          : `<div class="muted">尚未安排～點「＋ 加入精選」用底部抽屜挑選。</div>`
      }
    </div>
  `;
}

function renderSwipeRow(day, period, it, idx, len){
  const isDone = !!doneItems[it.id];
  const displayName = it.kind === "place"
    ? (placeById.get(it.placeId)?.name || it.zh || "（已刪除的地點）")
    : (it.zh || "");
  const subtitle = it.kind === "place"
    ? (()=> {
        const p = placeById.get(it.placeId);
        if(!p) return "";
        const tags = (p.tags||[]).slice(0,4).map(t=>"#"+t).join(" ");
        return `${p.area} · ${labelType(p.type)}${tags ? " · "+tags : ""}`;
      })()
    : (it.en ? it.en : "");

  return `
    <div class="swipeItem"
         data-swipe="item"
         data-day="${day}"
         data-period="${escapeHTML(period)}"
         data-itemid="${it.id}"
         data-idx="${idx}"
         data-len="${len}"
         data-done="${isDone ? 1 : 0}">
      <div class="swipeBg">
        <div class="doneBg">✅ 完成</div>
        <div class="moreBg">
          <button class="moreBtn" type="button" data-action="up">上移</button>
          <button class="moreBtn" type="button" data-action="down">下移</button>
          <button class="moreBtn" type="button" data-action="delete">移除</button>
        </div>
      </div>

      <div class="swipeFg" data-swipe="fg">
        <div class="swipeRow">
          <div class="iosCheck" data-action="toggleDone" title="完成/取消完成"><span class="tick">✓</span></div>
          <div class="swipeMain">
            <div><strong>${escapeHTML(displayName)}</strong></div>
            ${subtitle ? `<div class="en">${escapeHTML(subtitle)}</div>` : ``}
          </div>
        </div>
      </div>
    </div>
  `;
}

function renderTypeChips(active){
  const chips = [
    {k:"all", t:"全部"},
    {k:"spot", t:"📍景點"},
    {k:"food", t:"🍽️餐廳"},
    {k:"cafe", t:"☕咖啡"},
    {k:"dessert", t:"🍰甜點"},
  ];
  return chips.map(c=>`
    <span class="chip ${active===c.k ? "active":""}" data-type="${c.k}">${c.t}</span>
  `).join("");
}
function applyFilter(){
  const list = document.getElementById("placeList");
  if(!list) return;

  const q = (document.getElementById("q")?.value || "").toLowerCase().trim();
  const type = window.__type || "all";
  const country = window.__country || "Italy";
  const city = window.__city || "all";

  const filtered = places.filter(p=>{
    if(country && p.country !== country) return false;
    if(city !== "all" && p.area !== city) return false;
    if(type !== "all" && p.type !== type) return false;
    const hay = (p.name+" "+(p.tags||[]).join(" ")).toLowerCase();
    if(q && !hay.includes(q)) return false;
    return true;
  });

  if(!filtered.length){
    list.innerHTML = `<div class="muted">沒有符合的結果，換個關鍵字或篩選條件試試。</div>`;
    return;
  }

  const byArea = groupBy(filtered, p=>p.area || "Other");
  const areas = Object.keys(byArea).sort();

  list.innerHTML = areas.map(area=>{
    const itemsArea = byArea[area];
    return `
      <div style="margin:8px 0 18px;">
        <div class="pill" style="background:rgba(31,122,76,.08);">${escapeHTML(area)} · ${itemsArea.length} items</div>
        <div style="height:10px"></div>

        <div class="list">
          ${itemsArea.map(p=>`
            <div class="item">
              <div>
                <h3>${typeEmoji(p.type)} ${escapeHTML(p.name)}</h3>
                <p>${labelType(p.type)}${p.tags?.length ? ` · #${p.tags.map(escapeHTML).join(" #")}` : ""}</p>
              </div>
              <div class="right">
                <button class="${featured.has(p.id) ? "btnMiniPrimary alt" : "btnMini"}"
                  type="button"
                  data-featured-toggle="${p.id}"
                  title="${featured.has(p.id) ? "取消精選" : "加到精選"}">✨</button>
              </div>
            </div>
          `).join("")}
        </div>
      </div>
    `;
  }).join("");
}

/* ===========================
  Global event delegation
=========================== */
let __bound = false;
function bindOnce(){
  if(__bound) return;
  __bound = true;

  document.addEventListener("click", async (e)=>{
    const t = e.target;

    // day open/close
    const dayToggle = t?.closest?.("[data-day-toggle]")?.getAttribute?.("data-day-toggle");
    if(dayToggle){
      const day = Number(dayToggle);
      setDayOpen(day, !openDays.has(day));
      return;
    }

    // featured toggle
    const featId = t?.getAttribute?.("data-featured-toggle");
    if(featId){ toggleFeatured(featId); return; }

    // type chips
    const typeKey = t?.getAttribute?.("data-type");
    if(typeKey){
      window.__type = typeKey;
      const chipbar = document.getElementById("chipbar");
      if(chipbar) chipbar.innerHTML = renderTypeChips(typeKey);
      applyFilter();
      return;
    }

    // save day note
    const dn = t?.getAttribute?.("data-save-daynote");
    if(dn){ saveDayNote(Number(dn)); return; }

    // save global note
    if(t?.hasAttribute?.("data-save-global")){ saveGlobalNote(); return; }

    // open picker (bottom sheet)
    const op = t?.getAttribute?.("data-open-picker");
    if(op){
      const [dayStr, period, city] = op.split("|");
      openSheet({ day: Number(dayStr), period, city });
      return;
    }

    // sheet pick
    const pick = t?.closest?.("[data-sheet-pick]")?.getAttribute?.("data-sheet-pick");
    if(pick && pickerTarget){
      addFeaturedToSlot(pickerTarget.day, pickerTarget.period, pick);
      return;
    }

    // swipe action buttons
    const act = t?.getAttribute?.("data-action");
    if(act){
      const item = t.closest?.('[data-swipe="item"]');
      if(!item) return;

      const day = Number(item.getAttribute("data-day"));
      const period = item.getAttribute("data-period");
      const itemId = item.getAttribute("data-itemid");
      const idx = Number(item.getAttribute("data-idx"));
      const len = Number(item.getAttribute("data-len"));

      if(act === "toggleDone"){ toggleDoneByItemId(itemId); return; }
      if(act === "delete"){ removeSlotItem(day, period, itemId); return; }
      if(act === "up"){ if(idx > 0) moveSlotItem(day, period, itemId, -1); return; }
      if(act === "down"){ if(idx < len-1) moveSlotItem(day, period, itemId, +1); return; }
    }

    // checklist delete
    const delId = t?.getAttribute?.("data-check-del");
    if(delId){
      checks = checks.filter(x=>x.id !== delId);
      saveChecks();
      renderChecks();
      return;
    }

    // checklist clear
    if(t?.id === "clearCheckAll"){
      checks = [];
      saveChecks();
      renderChecks();
      return;
    }

    // photos clear
    if(t?.id === "clearPhotos"){
      await idbClear();
      renderPhotos();
      return;
    }

    // photo delete
    const photoDel = t?.getAttribute?.("data-photo-del");
    if(photoDel){
      await idbDelete(photoDel);
      renderPhotos();
      return;
    }
  });

  document.addEventListener("change", async (e)=>{
    const t = e.target;

    // checklist toggle
    const checkToggle = t?.getAttribute?.("data-check-toggle");
    if(checkToggle){
      checks = checks.map(x=> x.id===checkToggle ? ({...x, done: !!t.checked}) : x);
      saveChecks();
      renderChecks();
      return;
    }

    // photos upload
    if(t?.id === "photoInput"){
      const files = Array.from(t.files || []);
      for(const f of files){
        if(!f.type.startsWith("image/")) continue;
        await idbPut({ id: uuid(), createdAt: Date.now(), name: f.name, blob: f });
      }
      t.value = "";
      renderPhotos();
      return;
    }
  });

  document.addEventListener("submit", (e)=>{
    const form = e.target;
    if(form?.id !== "checkForm") return;
    e.preventDefault();
    const input = document.getElementById("checkInput");
    const text = (input?.value || "").trim();
    if(!text) return;
    checks.push({ id: uuid(), text, done:false, createdAt: Date.now() });
    saveChecks();
    renderChecks();
    input.value = "";
  });

  // swipe gesture
  let swipe = null;
  const clamp = (n, min, max)=> Math.max(min, Math.min(max, n));

  document.addEventListener("pointerdown", (e)=>{
    const fg = e.target.closest?.('[data-swipe="fg"]');
    if(!fg) return;
    const item = fg.closest?.('[data-swipe="item"]');
    if(!item) return;
    if(e.target?.closest?.("[data-action]")) return;

    swipe = { item, fg, startX: e.clientX, startY: e.clientY, dx: 0, dragging: false };
    item.classList.add("isDragging");
    fg.setPointerCapture?.(e.pointerId);
  });

  document.addEventListener("pointermove", (e)=>{
    if(!swipe) return;

    const dx = e.clientX - swipe.startX;
    const dy = e.clientY - swipe.startY;

    if(!swipe.dragging){
      if(Math.abs(dx) < 8) return;
      if(Math.abs(dy) > Math.abs(dx)){
        swipe.item.classList.remove("isDragging");
        swipe = null;
        return;
      }
      swipe.dragging = true;
    }

    swipe.dx = dx;
    const x = clamp(dx, -150, 120);
    swipe.fg.style.transform = `translateX(${x}px)`;

    if(x > 18) swipe.item.setAttribute("data-reveal", "done");
    else if(x < -18) swipe.item.setAttribute("data-reveal", "more");
    else swipe.item.removeAttribute("data-reveal");
  });

  document.addEventListener("pointerup", ()=>{
    if(!swipe) return;

    const { item, fg, dx } = swipe;
    item.classList.remove("isDragging");

    const itemId = item.getAttribute("data-itemid");

    if(dx > 64){
      toggleDoneByItemId(itemId);
      swipe = null;
      return;
    }

    if(dx < -70){
      item.setAttribute("data-reveal", "more");
      fg.style.transform = "translateX(-120px)";
      swipe = null;
      return;
    }

    item.removeAttribute("data-reveal");
    fg.style.transform = "translateX(0)";
    swipe = null;
  });

  document.addEventListener("click", (e)=>{
    const open = document.querySelector('.swipeItem[data-reveal="more"]');
    if(!open) return;
    if(e.target.closest?.('.swipeItem[data-reveal="more"]')) return;
    const fg = open.querySelector('[data-swipe="fg"]');
    open.removeAttribute("data-reveal");
    if(fg) fg.style.transform = "translateX(0)";
  });
}

/* ===========================
  Main render
=========================== */
function render(){
  const r = route();
  setActive(r);

  if(r === "home") { renderHome(); return; }
  if(r === "itinerary") { renderItinerary(); return; }
  if(r === "explore") { renderExplore(); return; }
  if(r === "notes") { renderNotes(); return; }

  location.hash = "#home";
}

window.addEventListener("DOMContentLoaded", () => {
  bindOnce();
  if(!location.hash) location.hash = "#home";
  render();
});
